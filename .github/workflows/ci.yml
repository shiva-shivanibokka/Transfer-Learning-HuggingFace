name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint + lightweight test stack (CPU torch, no transformers/gradio)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Lint
        run: ruff check .
      - name: Run lightweight tests
        # Pure-logic + contract tests. Tests needing heavy/networked deps
        # (transformers, gradio, datasets, torchvision) skip themselves via
        # importorskip, so CI stays fast and free.
        run: pytest tests/ -q
